name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Version aus Tag ableiten
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Version in Quellcode und build.sh eintragen
        run: |
          sed -i '' "s/^VERSION=.*/VERSION=\"$VERSION\"/" build.sh
          sed -i '' "s/static let version = \"[^\"]*\"/static let version = \"$VERSION\"/" \
            Sources/UnquarantineApp/Updater.swift

      - name: DMG bauen
        run: ./build.sh

      - name: GitHub Release erstellen und DMG hochladen
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Unquarantine $VERSION" \
            --generate-notes \
            Unquarantine.dmg
        env:
          GH_TOKEN: ${{ github.token }}
